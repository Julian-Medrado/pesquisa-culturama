<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="culturama-favico.png">
    <title>Pesquisa Culturama</title>
</head>
<body>
    <header>
        <h1>Pesquisa Online</h1>
    </header>
    <section>
        <form action="" method="get">
            <fieldset>
                <legend>Dados Pessoais</legend>
                <label for="name">Nome</label>
                <input id="name" type="text" name="userName" required>
                <br>
                <label for="age">Idade</label>
                <input id="age" type="number" name="userAge" min="12" max="100" required>
                <br>
                <label for="birthDate">Data de Nascimento</label>
                <input id="birthDate" type="date" name="userBirthDate">
                <br>
                <label for="email">Email</label>
                <input id="email" type="email" name="userEmail" required>
                <br>
                <label for="phone">Tel. de Contato</label>
                <input id="phone" type="" name="userPhone" pattern="[0-9]{11}" placeholder="11123456789">
                <br>
                <label for="image">upload Imagem</label>
                <input type="file" id="image" name="userImage" accept="image/*">
                <br>
            </fieldset> 
            
            <fieldset>
                <legend>Perfil</legend>

                <input id= "fem" type="radio" name="userGender" value="Female">
                <label for="fem">Feminino</label>

                <input id= "masc" type="radio" name="userGender" value="Male">
                <label for="masc">Masculino</label>

                <input id= "NotInformed" type="radio" name="userGender" value="NotInformed">
                <label for="NotInformed">Prefiro não informar</label>
                <br>

                <label for="miritalStatus">Estado civil</label>

                <select id= "miritalStatus" name="userMiritalStatus">
                    <option value="NotInformed">Selecione...</option>
                    <option value="solteiro">solteiro(a)</option>
                    <option value="casado">casado(a)</option>
                    <option value="divorciado">divorciado(a)</option>
                    <option value="UniaoEstavel">Uniao Estavel</option>


                </select>
                <br>

                <label for="state">Estado</label>
                <select id="state" name="userState">

                    <option value="Acre">Acre</option>
                    <option value="Alagoas">Alagoas</option>
                    <option value="Amapa">Amapa</option>
                    <option value="Amazonas">Amazonas</option>
                    <option value="Bahia">Bahia</option>
                    <option value="Ceara">Ceará</option>
                    <option value="DistritoFederal">Distrito Federal</option>
                    <option value="Goias">Goiás</option>
                    <option value="Maranhao">Maranhão</option>
                    <option value="MatoGrossodoSul">Mato Grosso do Sul</option>
                    <option value="MatoGrosso">Mato Grosso</option>
                    <option value="MinasGerais">Minas Gerais</option>
                    <option value="Para">Pará</option>
                    <option value="Paraiba">Paraíba</option>
                    <option value="Parana">Paraná</option>
                    <option value="Pernambuco">Pernambuco</option>
                    <option value="Piaui">Piauí</option>
                    <option value="RiodeJaneiro">Rio de Janeiro</option>
                    <option value="RioGrandedoNorte">Rio Grande do Norte</option>
                    <option value="RioGrandedoSul">Rio Grande do Sul</option>
                    <option value="Rondonia">Rondônia</option>
                    <option value="Roraima">Roraima</option>
                    <option value="SantaCatarina">Santa Catarina</option>
                    <option value="SaoPaulo">São Paulo</option>
                    <option value="Sergipe">Sergipe</option>
                    <option value="Tocantins">Tocantins</option>

                </select>

                <label for="userCity">Cidade</label>
                <input type="text" id= "userCity" name="userCity" autocomplete="address-level2" placeholder="Ex.: Fortaleza">


            </fieldset>
            
            <fieldset>
                
                <legend>Hábitos</legend>
                <p>Redes Sociais</p>

                <input type="checkbox" id="instagram" name="userSocial" value="instagram">
                <label for="instagram" >Instagram</label><br>
                
                <input type="checkbox" id="facebook" name="userSocial" value="facebook">
                <label for="facebook" >facebook</label><br>
                
                <input type="checkbox" id="x" name="userSocial" value="x">
                <label for="x" >X</label><br>

                <input type="checkbox" id="linkedin" name="userSocial" value="linkedin">
                <label for="linkedin" >Linkedin</label><br>

                <label for="musicStyle">Estilo musical</label>
                <input list="styleTypes" id="musicStyle" type="text" name="userMusicStyle">
                <datalist id="styleTypes">
                    <option value="Rock"></option>
                    <option value="Rap"></option>
                    <option value="Pop"></option>
                    <option value="Coutry"></option>
                </datalist><br>

                <label for="favoriteColor">Cor favorita</label>
                <input type="color" name="userFavoriteColor" id="favoriteColor">

            </fieldset>

            <fieldset>
                <legend>Opinião do usuario</legend>
                <p>O que você acha e qual a sua opinião sobre o serviço</p>

                <input type="radio" name="userServiceOpinion" id="otimo" value="otima">
                <label for="otimo">Ótima</label><br>
                <input type="radio" name="userServiceOpinion" id="boa" value="boa">
                <label for="boa">Boa</label><br>
                <input type="radio" name="userServiceOpinion" id="regular" value="regular">
                <label for="regular">Regular</label><br>
                <input type="radio" name="userServiceOpinion" id="ruim" value="ruim">
                <label for="ruim">Ruim</label><br>

                <label for="comment">Escreva com suas palavras sua opinião: </label>
                <textarea id="comment" name="userComment" placeholder="Digite aqui..."></textarea>


            </fieldset>
            
            <fieldset>
                <legend>Confirmações</legend>

                <input type="checkbox" name="userLgpd" id="userLgpdTerm" value="accepted" required>
                <label for="userLgpdTerm">Eu aceito participar dapesquisa</label><br>

                <input type="checkbox" name="userGetResult" id="getResult" value="accepted">
                <label for="getResult">Desejo receber o resultado via email</label><br>
            </fieldset>

            <button type="submit">Enviar</button>
            <button type="reset">Limpar</button>

        </form>
    </section>
    
</body>
</html>
